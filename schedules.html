<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الجداول الثابتة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#07090f;--s:#0f1623;--s2:#161e2e;--s3:#1c2840;
  --ops:#00d4aa;--og:rgba(0,212,170,.12);
  --qual:#f59e0b;--qg:rgba(245,158,11,.12);
  --blue:#3b82f6;--blg:rgba(59,130,246,.12);
  --red:#fc5c7d;--rdg:rgba(252,92,125,.12);
  --purple:#818cf8;--pg:rgba(129,140,248,.12);
  --text:#e2e8f0;--muted:#4a5568;--dim:#718096;
  --border:rgba(255,255,255,.06);--r:12px;
  --ka1:#3b82f6;--ka2:#f59e0b;--ka3:#a855f7;--ka4:#ec4899;--ka5:#14b8a6;
}
body.light{
  --bg:#f1f5f9;--s:#ffffff;--s2:#f8fafc;--s3:#e2e8f0;
  --text:#0f172a;--muted:#94a3b8;--dim:#64748b;
  --border:rgba(0,0,0,.08);
  --og:rgba(0,180,130,.1);--blg:rgba(59,130,246,.1);
  --qg:rgba(245,158,11,.1);--rdg:rgba(252,92,125,.1);--pg:rgba(168,85,247,.1);
}
body.light header{background:rgba(255,255,255,.96)}
body.light .mtbl th{background:#e2e8f0;color:#334155}
body.light .mtbl td:first-child{background:#f8fafc}
body.light .sched-card{background:#fff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.013) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.013) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
.load-ov{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .35s}
.load-ov.hide{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid var(--s3);border-top-color:var(--ops);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
header{position:sticky;top:0;z-index:100;background:rgba(7,9,15,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:54px}
.logo{font-size:1rem;font-weight:900;background:linear-gradient(135deg,var(--ops),#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-r{display:flex;align-items:center;gap:8px}
.back-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:var(--s2);color:var(--dim);font-family:'Cairo',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .18s;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.back-btn:hover{background:var(--s3);color:var(--text)}
.tabs-bar{background:transparent;border-bottom:1px solid var(--border);padding:0 18px;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs-bar::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;border:none;background:transparent;color:var(--muted);font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text)}.tab.act{color:var(--ops);border-bottom-color:var(--ops)}
main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:16px}
.view{display:none}.view.show{display:block}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:7px;background:var(--s);border:1px solid var(--border);border-radius:9px;padding:7px 12px;flex:1;max-width:320px}
.search-box input{background:transparent;border:none;outline:none;color:var(--text);font-family:'Cairo',sans-serif;font-size:.8rem;width:100%}
.search-box input::placeholder{color:var(--muted)}
.btn{padding:7px 15px;border-radius:8px;border:none;font-family:'Cairo',sans-serif;font-size:.76rem;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn-ops{background:var(--ops);color:#07090f}.btn-ops:hover{filter:brightness(1.1)}
.btn-ghost{background:var(--s2);color:var(--dim);border:1px solid var(--border)}.btn-ghost:hover{background:var(--s3);color:var(--text)}
.btn-red{background:var(--rdg);color:var(--red);border:1px solid rgba(252,92,125,.2)}.btn-red:hover{background:rgba(252,92,125,.25)}
.btn-sm{padding:4px 9px;font-size:.66rem;border-radius:6px}
.fr{margin-bottom:12px}.flbl{font-size:.7rem;color:var(--dim);margin-bottom:4px;display:block;font-weight:700}
.finput,.fsel,.ftxt{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-family:'Cairo',sans-serif;font-size:.8rem;outline:none;transition:border-color .2s}
.finput:focus,.fsel:focus,.ftxt:focus{border-color:rgba(255,255,255,.18)}
.fsel option{background:var(--s2)}.ftxt{resize:vertical;min-height:70px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sbtn{width:100%;padding:10px;border-radius:9px;border:none;font-family:'Cairo',sans-serif;font-size:.86rem;font-weight:800;cursor:pointer;transition:all .2s;margin-top:6px}
.sbtn-ops{background:var(--ops);color:#07090f}.sbtn-ops:hover{filter:brightness(1.1)}
.sbtn-red{background:var(--rdg);color:var(--red);border:1px solid rgba(252,92,125,.3)}
.overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.82);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--s);border:1px solid rgba(255,255,255,.09);border-radius:18px;width:580px;max-width:100%;padding:22px;position:relative;animation:mup .22s ease;max-height:92vh;overflow-y:auto}
.modal-wide{width:780px}
@keyframes mup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.mcls{position:absolute;top:11px;left:11px;width:26px;height:26px;border-radius:6px;background:var(--s2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center}
.mcls:hover{color:var(--text)}.mtitle{font-size:.95rem;font-weight:800;margin-bottom:15px;padding-left:28px}
/* SCHEDULE CARD */
.sched-card{background:var(--s);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;transition:border-color .2s}
.sched-card:hover{border-color:rgba(0,212,170,.2)}
.sched-hdr{padding:12px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:8px}
.sched-site{font-size:.88rem;font-weight:800}
.sched-freq{font-size:.63rem;padding:2px 8px;border-radius:4px;font-weight:700}
.sf-weekly{background:var(--blg);color:#60a5fa}
.sf-monthly{background:var(--og);color:var(--ops)}
.sf-daily{background:var(--pg);color:var(--purple)}
.sched-body{padding:11px 15px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.day-pill{padding:3px 9px;border-radius:12px;font-size:.62rem;font-weight:700;background:var(--s2);border:1px solid var(--border);color:var(--muted)}
.day-pill.active{background:var(--og);color:var(--ops);border-color:rgba(0,212,170,.2)}
.eng-badge{background:var(--blg);color:#93c5fd;border-radius:6px;padding:3px 9px;font-size:.65rem;font-weight:600}
/* MONTHLY TABLE */
.tbl-wrap{overflow-x:auto}
.mtbl{width:100%;border-collapse:separate;border-spacing:0;font-size:.72rem}
.mtbl th{
  text-align:center;padding:8px 4px;
  background:#0d1829;color:#94a3b8;
  font-weight:800;font-size:.58rem;
  border-bottom:2px solid rgba(255,255,255,.08);
  white-space:nowrap;position:sticky;top:0;z-index:10;
  letter-spacing:.3px;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
.mtbl th:first-child{
  text-align:right;min-width:150px;padding:8px 14px;
  position:sticky;right:0;top:0;background:#0d1829;z-index:11;
  border-left:1px solid rgba(255,255,255,.05);
}
.mtbl td{
  padding:5px 3px;
  border-bottom:1px solid rgba(255,255,255,.04);
  text-align:center;vertical-align:middle;
  transition:background .12s;
}
.mtbl td:first-child{
  text-align:right;padding:8px 14px;
  color:var(--text);white-space:nowrap;
  position:sticky;right:0;background:var(--s);z-index:1;
  border-left:1px solid rgba(255,255,255,.04);
  border-bottom:1px solid rgba(255,255,255,.04);
}
.mtbl tr:hover td{background:rgba(255,255,255,.025)}
.mtbl tr:hover td:first-child{background:var(--s2)}
.mtbl tr:last-child td{border-bottom:none}

/* CELL VISIT BUBBLES */
.cell-visit{
  border-radius:10px;
  width:34px;height:34px;
  display:inline-flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:transform .15s, box-shadow .15s, filter .15s;
  font-size:1.05rem;
  margin:2px auto;
}
.cell-visit:hover{transform:scale(1.2);filter:brightness(1.15);box-shadow:0 6px 18px rgba(0,0,0,.5)}

/* مجدولة — أزرق واضح */
.cv-sched{
  background:linear-gradient(145deg,#2563eb,#60a5fa);
  box-shadow:0 3px 10px rgba(37,99,235,.5);
}
/* مكتملة — أخضر ساطع */
.cv-done{
  background:linear-gradient(145deg,#059669,#34d399);
  box-shadow:0 3px 10px rgba(5,150,105,.5);
}
/* مؤجلة — برتقالي/أصفر */
.cv-post{
  background:linear-gradient(145deg,#d97706,#fbbf24);
  box-shadow:0 3px 10px rgba(217,119,6,.4);
}
/* ملغية — رمادي واضح */
.cv-cancel{
  background:rgba(100,116,139,.25);
  border:1px solid rgba(100,116,139,.4);
}
/* متوقعة — بنفسجي منقط */
.cv-pred{
  background:rgba(129,140,248,.08);
  border:2px dashed rgba(129,140,248,.6);
  width:32px;height:32px;
  color:var(--purple);font-size:1.1rem;font-weight:900;
}
.cv-pred:hover{background:rgba(129,140,248,.2);}

/* تمييز اليوم الحالي */
.cell-today{background:rgba(0,212,170,.06)!important}
.col-today-hdr{color:#34d399!important;font-weight:900!important;background:rgba(0,212,170,.12)!important;border-bottom:2px solid var(--ops)!important}
.col-today-cell{background:rgba(0,212,170,.05)!important}
.fri-col{opacity:.25}
/* DAY SELECTOR */
.days-sel{display:flex;gap:5px;flex-wrap:wrap}
.ds-btn{padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Cairo',sans-serif;font-size:.7rem;cursor:pointer;transition:all .15s}
.ds-btn.on{background:var(--og);color:var(--ops);border-color:rgba(0,212,170,.3)}
/* ENGINEER MULTI-SELECT */
.eng-selector{display:flex;flex-wrap:wrap;gap:5px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px;min-height:42px}
.eng-toggle{padding:4px 11px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Cairo',sans-serif;font-size:.7rem;cursor:pointer;transition:all .15s}
.eng-toggle.sel{background:var(--blg);color:#93c5fd;border-color:rgba(59,130,246,.3)}
/* WORK PLAN */
.pdf-upload{border:2px dashed rgba(255,255,255,.1);border-radius:8px;padding:14px;text-align:center;cursor:pointer;position:relative;transition:border-color .2s}
.pdf-upload:hover{border-color:var(--blue)}
.pdf-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
/* TOAST */
.toast{position:fixed;bottom:14px;right:14px;z-index:9999;background:var(--s);border:1px solid var(--border);border-radius:9px;padding:9px 14px;font-size:.74rem;font-weight:600;transform:translateY(50px);opacity:0;transition:all .26s;box-shadow:0 7px 22px rgba(0,0,0,.55)}
.toast.show{transform:translateY(0);opacity:1}
.toast.t-ok{border-color:var(--ops)}.toast.t-err{border-color:var(--red)}.toast.t-info{border-color:var(--blue)}
.empty{padding:30px;text-align:center;color:var(--muted);font-size:.76rem}
.empty-icon{font-size:1.8rem;opacity:.28;margin-bottom:7px}
/* CARD */
.panel{background:var(--s);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
@media(max-width:768px){
  .fr2{grid-template-columns:1fr}
  .modal,.modal-wide{border-radius:18px 18px 0 0;max-height:92vh;width:100%}
  .overlay{padding:0;align-items:flex-end}
  main{padding:10px}
}
</style>
</head>
<body class="light">
<div class="load-ov" id="loadOv"><div class="spinner"></div><div style="font-size:.76rem;color:var(--muted)">جاري التحميل...</div></div>
<header>
  <div class="logo">📅 الجداول الثابتة</div>
  <div class="hdr-r">
    
    <span id="hdrUserName" style="font-size:.72rem;color:var(--muted)"></span>
    <a href="sites.html" class="back-btn">🏢 المواقع</a>
    <a href="index.html" class="back-btn">← الداش بورد</a>
    <a href="guide.html" class="back-btn">📖 الدليل</a>
  </div>
</header>
<div class="tabs-bar">
  <button class="tab act" onclick="switchTab('today',this)">📍 مواقع اليوم</button>
  <button class="tab" onclick="switchTab('schedules',this)">📋 الجداول الثابتة</button>
  <button class="tab" onclick="switchTab('monthly',this)">📅 الجدول الشهري</button>
</div>
<main>

<!-- ══ TODAY TAB ══ -->
<div class="view show" id="view-today">
  <div id="todayHeader" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <div id="todayDateLabel" style="font-size:1.1rem;font-weight:900;color:var(--ops)"></div>
        <div id="todaySubLabel" style="font-size:.7rem;color:var(--muted);margin-top:2px"></div>
      </div>
      <div style="display:flex;gap:7px">
        <button class="btn btn-ghost btn-sm" onclick="shiftToday(-1)">‹ أمس</button>
        <button class="btn btn-ghost btn-sm" onclick="goToday()">اليوم</button>
        <button class="btn btn-ghost btn-sm" onclick="shiftToday(1)">غداً ›</button>
      </div>
    </div>
  </div>
  <div id="todayGrid"></div>
</div>

<!-- ══ SCHEDULES TAB ══ -->
<div class="view" id="view-schedules">
  <div class="top-bar">
    <div class="search-box">🔍 <input type="text" placeholder="ابحث عن موقع..." id="schedSearch" oninput="renderScheduleCards()"></div>
    <select class="finput" id="schedKAFilter" style="width:auto;font-size:.75rem" onchange="renderScheduleCards()">
      <option value="">👥 كل الأكونتات</option>
    </select>
    <button class="btn btn-ops" onclick="openSchedModal()">+ إضافة جدول</button>
  </div>
  <div id="schedCards"></div>
</div>

<!-- ══ MONTHLY TAB ══ -->
<div class="view" id="view-monthly">
  <div class="top-bar" style="margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="shiftMonth(-1)">‹ السابق</button>
      <select class="finput" id="mMonth" style="width:auto" onchange="renderMonthly()">
        <option value="0">يناير</option><option value="1">فبراير</option><option value="2">مارس</option>
        <option value="3">أبريل</option><option value="4">مايو</option><option value="5">يونيو</option>
        <option value="6">يوليو</option><option value="7">أغسطس</option><option value="8">سبتمبر</option>
        <option value="9">أكتوبر</option><option value="10">نوفمبر</option><option value="11">ديسمبر</option>
      </select>
      <select class="finput" id="mYear" style="width:auto" onchange="renderMonthly()"></select>
      <button class="btn btn-ghost btn-sm" onclick="shiftMonth(1)">التالي ›</button>
    </div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      <button class="btn btn-ops" onclick="generateMonthVisits()">⚡ توليد زيارات الشهر</button>
      <button class="btn btn-ghost" onclick="exportMonthlyCSV()">📥 Excel</button>
      <button class="btn btn-ghost" onclick="window.print()">🖨️ طباعة</button>
    </div>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;align-items:center">
    <span style="display:flex;align-items:center;gap:5px;font-size:.66rem;color:var(--muted)"><span style="width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#1e40af,#3b82f6);display:inline-flex;align-items:center;justify-content:center;font-size:.75rem">📅</span>مجدولة</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:.66rem;color:var(--muted)"><span style="width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#065f46,#00d4aa);display:inline-flex;align-items:center;justify-content:center;font-size:.75rem">✅</span>مكتملة</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:.66rem;color:var(--muted)"><span style="width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#92400e,#f59e0b);display:inline-flex;align-items:center;justify-content:center;font-size:.75rem">⏰</span>مؤجلة</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:.66rem;color:var(--muted)"><span style="width:22px;height:22px;border-radius:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:inline-flex;align-items:center;justify-content:center;font-size:.75rem">✕</span>ملغية</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:.66rem;color:var(--muted)"><span style="width:22px;height:22px;border-radius:6px;border:2px dashed rgba(129,140,248,.5);display:inline-flex;align-items:center;justify-content:center;font-size:.75rem;color:var(--purple)">+</span>متوقعة — اضغط لجدولة</span>
  </div>
  <div class="panel">
    <div class="tbl-wrap" style="padding:8px;overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 195px)">
      <table class="mtbl" id="monthTable">
        <thead><tr id="monthHead"></tr></thead>
        <tbody id="monthBody"></tbody>
      </table>
    </div>
  </div>
</div>

</main>

<!-- ══ SCHEDULE MODAL ══ -->
<div class="overlay" id="schedOverlay">
  <div class="modal">
    <button class="mcls" onclick="closeSchedModal()">✕</button>
    <div class="mtitle" id="schedModalTitle">📋 إضافة جدول ثابت</div>
    <div class="fr">
      <label class="flbl">الموقع *</label>
      <select class="fsel" id="smSite"><option value="">— اختر موقع —</option></select>
    </div>
    <div class="fr">
      <label class="flbl">المهندس الافتراضي</label>
      <select class="fsel" id="smEngineer"><option value="">— بدون مهندس —</option></select>
    </div>
    <div class="fr">
      <label class="flbl">نوع التكرار *</label>
      <select class="fsel" id="smFreq" onchange="toggleFreqFields()">
        <option value="weekly">أسبوعي — يوم أو يومين ثابت في الأسبوع</option>
        <option value="biweekly">كل أسبوعين</option>
        <option value="monthly_once">شهري — مرة واحدة</option>
        <option value="monthly_twice">شهري — مرتين</option>
        <option value="daily">يومي — كل يوم</option>
      </select>
    </div>
    <div class="fr" id="weekDaysRow">
      <label class="flbl">أيام الأسبوع</label>
      <div class="days-sel">
        <button class="ds-btn" data-d="0" onclick="toggleDay(this)">الأحد</button>
        <button class="ds-btn" data-d="1" onclick="toggleDay(this)">الاثنين</button>
        <button class="ds-btn" data-d="2" onclick="toggleDay(this)">الثلاثاء</button>
        <button class="ds-btn" data-d="3" onclick="toggleDay(this)">الأربعاء</button>
        <button class="ds-btn" data-d="4" onclick="toggleDay(this)">الخميس</button>
        <button class="ds-btn" data-d="6" onclick="toggleDay(this)">السبت</button>
      </div>
    </div>
    <div class="fr" id="monthDaysRow" style="display:none">
      <label class="flbl">أيام الشهر — ادخل الأرقام مفصولة بفاصلة (مثال: 5 أو 5,20)</label>
      <input type="text" class="finput" id="smMonthDays" placeholder="5 أو 5,20">
    </div>
    <div class="fr">
      <label class="flbl">ملاحظات</label>

// ══════════════════════
// DATE GENERATION
// ══════════════════════
function generateDates(sc, fromDateStr, count=60){
  const results=[];
  const freq=sc.freq_type;
  const weekDays=(sc.week_days||[]).map(Number);
  const monthDays=(sc.month_days||[]).map(Number);
  const from=new Date(fromDateStr+'T12:00:00');

  if(freq==='daily'){
    let d=new Date(from);d.setDate(d.getDate()+1);
    while(results.length<count){results.push(d.toISOString().split('T')[0]);d.setDate(d.getDate()+1);}
  }
  else if(freq==='weekly'){
    if(!weekDays.length) return [];
    let cur=new Date(from);cur.setDate(cur.getDate()+1);
    const end=new Date(from);end.setFullYear(end.getFullYear()+2);
    while(cur<=end&&results.length<count){
      if(weekDays.includes(cur.getDay())) results.push(cur.toISOString().split('T')[0]);
      cur.setDate(cur.getDate()+1);
    }
  }
  else if(freq==='biweekly'){
    if(!weekDays.length) return [];
    // collect all weekly occurrences then keep every other one
    const all=[];
    let cur=new Date(from);cur.setDate(cur.getDate()+1);
    const end=new Date(from);end.setFullYear(end.getFullYear()+2);
    while(cur<=end&&all.length<count*2){
      if(weekDays.includes(cur.getDay())) all.push(cur.toISOString().split('T')[0]);
      cur.setDate(cur.getDate()+1);
    }
    return all.filter((_,i)=>i%2===0).slice(0,count);
  }
  else if(freq==='monthly_once'||freq==='monthly_twice'){
    if(!monthDays.length) return [];
    const end=new Date(from);end.setFullYear(end.getFullYear()+2);
    let y=from.getFullYear(),m=from.getMonth();
    while(results.length<count){
      const newDate=new Date(y,m+1,0);// last day of month
      monthDays.slice().sort((a,b)=>a-b).forEach(day=>{
        const d=new Date(y,m,Math.min(day,newDate.getDate()));
        if(d>from&&d<=end&&results.length<count) results.push(d.toISOString().split('T')[0]);
      });
      m++;if(m>11){m=0;y++;}
      if(new Date(y,m,1)>end) break;
    }
  }
  return results;
}

function shiftMonth(dir){
  const mSel=document.getElementById('mMonth');
  const ySel=document.getElementById('mYear');
  let m=parseInt(mSel.value)+dir, y=parseInt(ySel.value);
  if(m>11){m=0;y++;}else if(m<0){m=11;y--;}
  mSel.value=m;ySel.value=y;renderMonthly();
}

function renderMonthly(){
  const month=parseInt(document.getElementById('mMonth').value);
  const year=parseInt(document.getElementById('mYear').value);
  if(isNaN(month)||isNaN(year))return;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthStr=`${year}-${String(month+1).padStart(2,'0')}`;
  const today=new Date().toISOString().split('T')[0];

  // Build header
  const thead=document.getElementById('monthHead');
  thead.innerHTML=`<th>الموقع</th>`+
    Array.from({length:daysInMonth},(_,i)=>{
      const d=new Date(year,month,i+1);
      const ds=`${monthStr}-${String(i+1).padStart(2,'0')}`;
      const isToday=ds===today;
      const isFri=d.getDay()===5;
      const todayCls=isToday?'col-today-hdr':'';
      const friCls=isFri?'fri-col':'';
      return `<th class="${todayCls} ${friCls}" style="min-width:42px">${i+1}<div style="font-size:.46rem;margin-top:2px;opacity:.8">${DAY_AR[d.getDay()]}</div></th>`;
    }).join('');

  const tbody=document.getElementById('monthBody');
  if(!schedules.length){
    tbody.innerHTML=`<tr><td colspan="${daysInMonth+1}" style="text-align:center;padding:24px;color:var(--muted)">أضف جدول ثابت لموقع أولاً</td></tr>`;
    return;
  }

  const prevMonthEnd=new Date(year,month,0).toISOString().split('T')[0];
  const monthVisits=visits.filter(v=>v.scheduled_date?.startsWith(monthStr));

  tbody.innerHTML=schedules.map(sc=>{
    const site=sites.find(s=>s.id===sc.site_id);
    const defEng=engineers.find(e=>e.id===sc.engineer_id);
    if(!site) return '';

    // Predicted dates for this month
    const predicted=generateDates(sc,prevMonthEnd,60).filter(d=>d.startsWith(monthStr));
    const realDates=new Set(monthVisits.filter(v=>v.site_id===site.id).map(v=>v.scheduled_date));

    const cells=Array.from({length:daysInMonth},(_,d)=>{
      const dayNum=d+1;
      const dayStr=`${monthStr}-${String(dayNum).padStart(2,'0')}`;
      const isToday=dayStr===today;
      const tdCls=isToday?'cell-today':'';

      const isFri=new Date(year,month,dayNum).getDay()===5;
      const tdExtra=isFri?'fri-col':'';
      const realVisit=monthVisits.find(v=>v.site_id===site.id&&v.scheduled_date===dayStr);
      if(realVisit){
        const clsMap={scheduled:'cv-sched',completed:'cv-done',postponed:'cv-post',cancelled:'cv-cancel'};
        const iconMap={scheduled:'📅',completed:'✅',postponed:'⏰',cancelled:'✕'};
        const veList=visitEngineers.filter(x=>x.visit_id===realVisit.id);
        const engNames=veList.map(ve=>engineers.find(e=>e.id===ve.engineer_id)?.name||'').filter(Boolean).join(' / ');
        return `<td class="${isToday?'col-today-cell':''} ${tdExtra}"><div class="cell-visit ${clsMap[realVisit.status]||'cv-sched'}" onclick="openVisitEdit('${realVisit.id}')" title="${site.name}&#10;${DAY_AR[new Date(dayStr+'T12:00:00').getDay()]} ${dayNum}&#10;${engNames||defEng?.name||'بدون مهندس'}&#10;الحالة: ${realVisit.status}">${iconMap[realVisit.status]||'📅'}</div></td>`;
      }
      if(predicted.includes(dayStr)){
        const engTip=defEng?.name||'بدون مهندس';
        return `<td class="${isToday?'col-today-cell':''} ${tdExtra}"><div class="cell-visit cv-pred" onclick="createVisitFromPred('${site.id}','${dayStr}','${sc.id}')" title="${site.name}&#10;${DAY_AR[new Date(dayStr+'T12:00:00').getDay()]} ${dayNum}&#10;${engTip}&#10;متوقعة — اضغط لجدولة">+</div></td>`;
      }
      return `<td class="${isToday?'col-today-cell':''} ${tdExtra}"></td>`;
    }).join('');

    const kaIdx=allUsers.findIndex(u=>u.id===site.assigned_to);
    const kaColor=kaIdx>=0?KA_COLORS[kaIdx%KA_COLORS.length]:'#00d4aa';
    const kaName=kaIdx>=0?(allUsers[kaIdx].full_name||allUsers[kaIdx].email).split(' ')[0]:'';
    const siteName=site.name.length>18?site.name.slice(0,17)+'…':site.name;
    const siteVisits=monthVisits.filter(v=>v.site_id===site.id);
    const done=siteVisits.filter(v=>v.status==='completed').length;
    const total=siteVisits.filter(v=>v.status!=='cancelled').length;
    const pct=total?Math.round(done/total*100):0;
    return `<tr>
      <td title="${site.name}" style="border-right:3px solid ${kaColor}">
        <div style="font-size:.75rem;font-weight:800;margin-bottom:2px">${siteName}</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:3px">
          <div style="flex:1;height:3px;background:var(--s3);border-radius:2px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:${pct>=100?'var(--ops)':'#3b82f6'};border-radius:2px;transition:width .4s"></div>
          </div>
          <span style="font-size:.55rem;color:var(--muted);white-space:nowrap">${done}/${total}</span>
        </div>
        ${kaName?`<div style="font-size:.55rem;font-weight:700;margin-top:2px;color:${kaColor}">👤 ${kaName}</div>`:''}
        ${defEng?`<div style="font-size:.56rem;color:var(--dim);margin-top:1px">👷 ${defEng.name.split(' ').slice(0,2).join(' ')}</div>`:''}
      </td>
      ${cells}
    </tr>`;
  }).filter(Boolean).join('');
}

// ══════════════════════
// GENERATE MONTH VISITS
// ══════════════════════
async function generateSiteMonth(schedId, siteId){
  const month=parseInt(document.getElementById('mMonth').value);
  const year=parseInt(document.getElementById('mYear').value);
  const monthStr=`${year}-${String(month+1).padStart(2,'0')}`;
  const prevEnd=new Date(year,month,0).toISOString().split('T')[0];
  const sc=schedules.find(x=>x.id===schedId);
  if(!sc) return;

  // الزيارات الموجودة فعلاً لهذا الموقع في هذا الشهر
  const existing=visits.filter(v=>v.site_id===siteId&&v.scheduled_date?.startsWith(monthStr));
  const existingDates=new Set(existing.map(v=>v.scheduled_date));

  // التواريخ المتوقعة من الجدول
  const predicted=generateDates(sc,prevEnd,60).filter(d=>d.startsWith(monthStr));
  const toInsert=predicted
    .filter(date=>!existingDates.has(date))
    .map((date,i)=>({site_id:siteId,scheduled_date:date,status:'scheduled',visit_number:existing.length+i+1}));

  if(!toInsert.length){
    showToast('✅ كل زيارات الموقع موجودة بالفعل','t-info');
    return;
  }

  const site=sites.find(s=>s.id===siteId);
  if(!confirm(`توليد ${toInsert.length} زيارة لـ "${site?.name}" في ${monthStr}؟`))return;

  const{data,error}=await db.from('visits').insert(toInsert).select();
  if(error){showToast('❌ '+error.message,'t-err');return;}

  // إسناد المهندس الافتراضي
  if(sc.engineer_id && data?.length){
    const engInserts=data.map(v=>({visit_id:v.id,engineer_id:sc.engineer_id}));
    await db.from('visit_engineers').insert(engInserts);
    visitEngineers.push(...engInserts.map((x,i)=>({...x,id:'gs'+Date.now()+i})));
  }

  visits=[...(data||[]),...visits];
  renderMonthly();renderToday();
  showToast(`⚡ تم توليد ${toInsert.length} زيارة لـ "${site?.name}"`, 't-ok');
}

async function generateMonthVisits(){
  const month=parseInt(document.getElementById('mMonth').value);
  const year=parseInt(document.getElementById('mYear').value);
  const monthStr=`${year}-${String(month+1).padStart(2,'0')}`;
  const prevEnd=new Date(year,month,0).toISOString().split('T')[0];
  const existing=new Set(visits.filter(v=>v.scheduled_date?.startsWith(monthStr)).map(v=>v.site_id+'_'+v.scheduled_date));
  const toInsert=[];
  schedules.forEach(sc=>{
    generateDates(sc,prevEnd,60).filter(d=>d.startsWith(monthStr)).forEach((date,i)=>{
      if(!existing.has(sc.site_id+'_'+date)) toInsert.push({site_id:sc.site_id,scheduled_date:date,status:'scheduled',visit_number:i+1});
    });
  });
  if(!toInsert.length){showToast('✅ كل الزيارات موجودة بالفعل','t-info');return;}
  if(!confirm(`سيتم إنشاء ${toInsert.length} زيارة لهذا الشهر — موافق؟`))return;
  const{data,error}=await db.from('visits').insert(toInsert).select();
  if(error){showToast('❌ '+error.message,'t-err');return;}
  // Add default engineers
  const engInserts=[];
  data.forEach(v=>{
    const sc=schedules.find(x=>x.site_id===v.site_id);
    if(sc?.engineer_id) engInserts.push({visit_id:v.id,engineer_id:sc.engineer_id});
  });
  if(engInserts.length) await db.from('visit_engineers').insert(engInserts);
  visits=[...(data||[]),...visits];
  visitEngineers=[...visitEngineers,...engInserts.map((x,i)=>({...x,id:'g'+i}))];
  renderMonthly();
  showToast(`⚡ تم إنشاء ${toInsert.length} زيارة`,'t-ok');
}

// VISIT EDIT MODAL
// ══════════════════════
function openVisitEdit(visitId){
  editVisitId=visitId;
  const v=visits.find(x=>x.id===visitId);
  if(!v) return;
  const site=sites.find(s=>s.id===v.site_id);
  document.getElementById('veTitle').textContent=`✏️ ${site?.name||''} — ${v.scheduled_date||''}`;
  document.getElementById('veDate').value=v.scheduled_date||'';
  document.getElementById('veNum').value=v.visit_number||'';
  document.getElementById('veStatus').value=v.status||'scheduled';
  document.getElementById('veNotes').value=v.general_notes||'';
  // Build multi engineer selector with current selection
  const currentEngs=visitEngineers.filter(x=>x.visit_id===visitId).map(x=>x.engineer_id);
  buildEngSelector('veEngSelector', currentEngs);
  document.getElementById('visitEditOverlay').classList.add('open');
}
function closeVisitEdit(){document.getElementById('visitEditOverlay').classList.remove('open');editVisitId=null;}
document.getElementById('visitEditOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('visitEditOverlay'))closeVisitEdit();});

async function saveVisitEdit(){
  const newDate=document.getElementById('veDate').value;
  if(!newDate){showToast('⚠️ أدخل التاريخ','t-err');return;}
  const payload={
    scheduled_date:newDate,
    visit_number:parseInt(document.getElementById('veNum').value)||null,
    status:document.getElementById('veStatus').value,
    general_notes:document.getElementById('veNotes').value.trim()
  };
  const{error}=await db.from('visits').update(payload).eq('id',editVisitId);
  if(error){showToast('❌ '+error.message,'t-err');return;}

  // Update engineers
  const selEngs=getSelectedEngs('veEngSelector');
  await db.from('visit_engineers').delete().eq('visit_id',editVisitId);
  if(selEngs.length) await db.from('visit_engineers').insert(selEngs.map(eid=>({visit_id:editVisitId,engineer_id:eid})));

  // Update local data
  const idx=visits.findIndex(x=>x.id===editVisitId);
  if(idx>-1) visits[idx]={...visits[idx],...payload};
  visitEngineers=visitEngineers.filter(x=>x.visit_id!==editVisitId);
  selEngs.forEach((eid,i)=>visitEngineers.push({visit_id:editVisitId,engineer_id:eid,id:'ve'+Date.now()+i}));
  closeVisitEdit();renderMonthly();
  showToast('✅ تم حفظ التعديل','t-ok');
}

async function deleteVisitEdit(){
  if(!confirm('حذف هذه الزيارة؟'))return;
  await db.from('visit_engineers').delete().eq('visit_id',editVisitId);
  await db.from('visits').delete().eq('id',editVisitId);
  visits=visits.filter(x=>x.id!==editVisitId);
  visitEngineers=visitEngineers.filter(x=>x.visit_id!==editVisitId);
  closeVisitEdit();renderMonthly();
  showToast('🗑️ تم الحذف','t-ok');
}

async function createVisitFromPred(siteId, date, schedId){
  const sc=schedules.find(x=>x.id===schedId);
  const monthStr=date.slice(0,7);
  const existingNum=visits.filter(v=>v.site_id===siteId&&v.scheduled_date?.startsWith(monthStr)).length;
  const{data,error}=await db.from('visits').insert([{
    site_id:siteId,scheduled_date:date,status:'scheduled',visit_number:existingNum+1
  }]).select().single();
  if(error){showToast('❌ '+error.message,'t-err');return;}
  visits.unshift(data);
  if(sc?.engineer_id){
    await db.from('visit_engineers').insert([{visit_id:data.id,engineer_id:sc.engineer_id}]);
    visitEngineers.push({visit_id:data.id,engineer_id:sc.engineer_id,id:'cv'+Date.now()});
  }
  renderMonthly();
  showToast('📋 تم جدولة الزيارة — اضغط عليها لتعديلها','t-ok');
}

function openWP(siteId){
  wpSiteId=siteId;
  const site=sites.find(s=>s.id===siteId);
  document.getElementById('wpTitle').textContent=`📄 خطة العمل — ${site?.name||''}`;
  document.getElementById('wpText').value=site?.work_plan_text||'';

  document.getElementById('pdfLinkArea').innerHTML=site?.work_plan_pdf?
    `<a href="${site.work_plan_pdf}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;background:var(--rdg);color:var(--red);border:1px solid rgba(252,92,125,.2);border-radius:6px;padding:4px 10px;font-size:.7rem;font-weight:700;text-decoration:none">📄 عرض PDF الحالي</a>
     <button onclick="removePdf('${siteId}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;margin-right:5px">✕ حذف</button>`:'';

function closeWP(){document.getElementById('wpOverlay').classList.remove('open');wpSiteId=null;}
document.getElementById('wpOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('wpOverlay'))closeWP();});

async function handlePdfUpload(input){
  const file=input.files[0];if(!file)return;
  const stat=document.getElementById('pdfStatus');
  stat.textContent='⏳ جاري الرفع...';
  const path=`workplans/${wpSiteId}_${Date.now()}.pdf`;
  const{error}=await db.storage.from('work-plans').upload(path,file,{upsert:true});
  if(error){stat.textContent='❌ '+error.message;return;}
  const{data:urlData}=db.storage.from('work-plans').getPublicUrl(path);
  const url=urlData.publicUrl;
  await db.from('sites').update({work_plan_pdf:url}).eq('id',wpSiteId);
  const s=sites.find(x=>x.id===wpSiteId);if(s)s.work_plan_pdf=url;
  stat.textContent='✅ تم الرفع بنجاح';
  document.getElementById('pdfLinkArea').innerHTML=`<a href="${url}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;background:var(--rdg);color:var(--red);border:1px solid rgba(252,92,125,.2);border-radius:6px;padding:4px 10px;font-size:.7rem;font-weight:700;text-decoration:none">📄 عرض PDF</a>`;
}

async function saveWorkPlan(){
  const text=document.getElementById('wpText').value.trim();
  const{error}=await db.from('sites').update({work_plan_text:text}).eq('id',wpSiteId);
  if(error){showToast('❌ '+error.message,'t-err');return;}
  const s=sites.find(x=>x.id===wpSiteId);if(s)s.work_plan_text=text;
  closeWP();renderScheduleCards();
  showToast('✅ تم حفظ خطة العمل','t-ok');
}

async function removePdf(siteId){
  if(!confirm('حذف PDF؟'))return;
  await db.from('sites').update({work_plan_pdf:null}).eq('id',siteId);
  const s=sites.find(x=>x.id===siteId);if(s)s.work_plan_pdf=null;
  document.getElementById('pdfLinkArea').innerHTML='';
  showToast('🗑️ تم','t-ok');
}

// ══════════════════════
// EXPORT
// ══════════════════════
function exportMonthlyCSV(){
  const month=parseInt(document.getElementById('mMonth').value);
  const year=parseInt(document.getElementById('mYear').value);
  const monthStr=`${year}-${String(month+1).padStart(2,'0')}`;
  const prevEnd=new Date(year,month,0).toISOString().split('T')[0];
  const monthVisits=visits.filter(v=>v.scheduled_date?.startsWith(monthStr));
  const stMap={scheduled:'مجدولة',completed:'مكتملة',postponed:'مؤجلة',cancelled:'ملغية'};
  const rows=[['الموقع','التاريخ','اليوم','المهندسون','الحالة','رقم الزيارة','ملاحظات']];
  schedules.forEach(sc=>{
    const site=sites.find(s=>s.id===sc.site_id);
    const predicted=generateDates(sc,prevEnd,60).filter(d=>d.startsWith(monthStr));
    const allDates=new Set([...monthVisits.filter(v=>v.site_id===sc.site_id).map(v=>v.scheduled_date),...predicted]);
    [...allDates].sort().forEach(date=>{
      const v=monthVisits.find(x=>x.site_id===sc.site_id&&x.scheduled_date===date);
      const veList=v?visitEngineers.filter(x=>x.visit_id===v.id):[];
      const engNames=veList.map(ve=>engineers.find(e=>e.id===ve.engineer_id)?.name||'').filter(Boolean).join(' / ')||engineers.find(e=>e.id===sc.engineer_id)?.name||'';
      rows.push([site?.name||'',date,DAY_AR[new Date(date+'T12:00:00').getDay()],engNames,v?stMap[v.status]:'متوقعة',v?.visit_number||'',v?.general_notes||'']);
    });
  });
  const csv='\uFEFF'+rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`جدول_${monthStr}.csv`;a.click();
  showToast('✅ تم التصدير','t-ok');
}

  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${cls} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}

}


// ══════════════════════
// TODAY VIEW
// ══════════════════════
let todayViewDate = new Date().toISOString().split('T')[0];

function shiftToday(dir){
  const d = new Date(todayViewDate + 'T12:00:00');
  d.setDate(d.getDate() + dir);
  todayViewDate = d.toISOString().split('T')[0];
  renderToday();
}
function goToday(){
  todayViewDate = new Date().toISOString().split('T')[0];
  renderToday();
}

function renderToday(){
  const d = new Date(todayViewDate + 'T12:00:00');
  const isActualToday = todayViewDate === new Date().toISOString().split('T')[0];
  const monthNames=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  document.getElementById('todayDateLabel').textContent =
    `${isActualToday ? '📍 ' : '📅 '}${DAY_AR[d.getDay()]} ${d.getDate()} ${monthNames[d.getMonth()]} ${d.getFullYear()}`;
  document.getElementById('todaySubLabel').textContent =
    isActualToday ? 'زيارات اليوم' : 'زيارات هذا اليوم';

  // Real visits on this date
  const dayVisits = visits.filter(v => v.scheduled_date === todayViewDate && v.status !== 'cancelled');

  // Predicted visits from schedules (sites with no real visit yet on this day)
  const realSiteIds = new Set(dayVisits.map(v => v.site_id));
  const predictedItems = [];
  schedules.forEach(sc => {
    if(realSiteIds.has(sc.site_id)) return;
    const dates = generateDates(sc, new Date(new Date(todayViewDate+'T12:00:00') - 86400000).toISOString().split('T')[0], 3);
    if(dates.includes(todayViewDate)) predictedItems.push(sc);
  });

  const el = document.getElementById('todayGrid');

  if(!dayVisits.length && !predictedItems.length){
    el.innerHTML = `<div class="empty"><div class="empty-icon">🌴</div>لا توجد زيارات مجدولة لهذا اليوم</div>`;
    return;
  }

  const stColors = {scheduled:'var(--blg)',completed:'var(--og)',postponed:'var(--qg)',cancelled:'var(--rdg)'};
  const stBorder = {scheduled:'rgba(59,130,246,.25)',completed:'rgba(0,212,170,.25)',postponed:'rgba(245,158,11,.25)',cancelled:'rgba(252,92,125,.25)'};
  const stLabel = {scheduled:'📋 مجدولة',completed:'✅ مكتملة',postponed:'⏰ مؤجلة',cancelled:'❌ ملغية'};

  const realHTML = dayVisits.map(v => {
    const site = sites.find(s => s.id === v.site_id);
    const veList = visitEngineers.filter(x => x.visit_id === v.id);
    const engList = veList.map(ve => engineers.find(e => e.id === ve.engineer_id)).filter(Boolean);
    const bg = stColors[v.status] || stColors.scheduled;
    const bd = stBorder[v.status] || stBorder.scheduled;
    return `<div style="background:${bg};border:1px solid ${bd};border-radius:12px;padding:14px 16px;margin-bottom:10px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap">
        <div>
          <div style="font-size:.9rem;font-weight:900;margin-bottom:4px">🏢 ${site?.name || '—'}</div>
          <div style="font-size:.65rem;color:var(--muted)">${site?.region || ''} ${site?.address ? '· '+site.address : ''}</div>
          <div style="margin-top:6px;font-size:.72rem;color:var(--dim)">زيارة رقم ${v.visit_number || '—'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
          <span style="font-size:.62rem;font-weight:700;padding:3px 9px;border-radius:5px;background:rgba(0,0,0,.2)">${stLabel[v.status]||''}</span>
          <button class="btn btn-ghost btn-sm" onclick="openVisitEdit('${v.id}')">✏️ تعديل</button>
        </div>
      </div>
      <div style="margin-top:10px;border-top:1px solid rgba(255,255,255,.07);padding-top:10px">
        <div style="font-size:.65rem;color:var(--muted);margin-bottom:7px;font-weight:700">👷 المهندسون</div>
        ${engList.length ?
          `<div style="display:flex;gap:6px;flex-wrap:wrap">
            ${engList.map(e => `<span style="background:var(--blg);color:#93c5fd;border-radius:6px;padding:4px 11px;font-size:.7rem;font-weight:700">👷 ${e.name}</span>`).join('')}
           </div>` :
          `<div style="font-size:.68rem;color:var(--muted)">لم يُسنَد مهندس بعد —
           <button onclick="openVisitEdit('${v.id}')" style="background:none;border:none;color:var(--ops);font-size:.68rem;cursor:pointer;font-family:Cairo,sans-serif;font-weight:700">+ أضف مهندس</button></div>`
        }
      </div>
      ${v.general_notes ? `<div style="margin-top:8px;font-size:.68rem;color:var(--dim);border-top:1px solid rgba(255,255,255,.05);padding-top:7px">📝 ${v.general_notes}</div>` : ''}
    </div>`;
  }).join('');

  const predHTML = predictedItems.map(sc => {
    const site = sites.find(s => s.id === sc.site_id);
    const defEng = engineers.find(e => e.id === sc.engineer_id);
    return `<div style="background:var(--pg);border:1px dashed rgba(129,140,248,.3);border-radius:12px;padding:14px 16px;margin-bottom:10px;opacity:.85">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-size:.9rem;font-weight:900;margin-bottom:3px">🏢 ${site?.name || '—'}</div>
          <div style="font-size:.65rem;color:var(--muted)">${site?.region || ''}</div>
          ${defEng ? `<div style="margin-top:5px"><span style="background:var(--blg);color:#93c5fd;border-radius:5px;padding:3px 9px;font-size:.67rem;font-weight:700">👷 ${defEng.name}</span></div>` : ''}
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <span style="font-size:.6rem;color:var(--purple);font-weight:700;background:rgba(129,140,248,.1);padding:3px 8px;border-radius:4px">متوقعة</span>
          <button class="btn btn-ghost btn-sm" onclick="createVisitFromPred('${sc.site_id}','${todayViewDate}','${sc.id}');setTimeout(renderToday,800)" style="color:var(--ops)">+ جدّل</button>
        </div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = realHTML + (predHTML ? `<div style="font-size:.68rem;color:var(--muted);margin:14px 0 8px;font-weight:700">🔮 متوقعة — لم تُجدَّل بعد</div>${predHTML}` : '');
}

init();
</script>

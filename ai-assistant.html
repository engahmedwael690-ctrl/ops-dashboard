<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المساعد الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f1f5f9;--s:#fff;--s2:#f8fafc;--s3:#e2e8f0;
  --text:#0f172a;--muted:#94a3b8;--dim:#64748b;
  --border:rgba(0,0,0,.08);--r:12px;
  --ai:#7c3aed;--aig:rgba(124,58,237,.08);
  --ops:#00c896;--og:rgba(0,200,150,.1)
}
body{
  font-family:'Cairo',sans-serif;background:var(--bg);
  color:var(--text);height:100vh;
  display:flex;flex-direction:column;overflow:hidden
}
body.dark{
  --bg:#07090f;--s:#0f1623;--s2:#161e2e;--s3:#1c2840;
  --text:#e2e8f0;--muted:#4a5568;--dim:#718096;
  --border:rgba(255,255,255,.07)
}
header{
  background:rgba(255,255,255,.97);
  border-bottom:1px solid var(--border);
  padding:0 18px;height:52px;
  display:flex;align-items:center;justify-content:space-between
}
.logo{font-weight:900}
main{
  flex:1;max-width:860px;margin:auto;width:100%;
  padding:14px;display:flex;flex-direction:column;gap:10px
}
.chat{
  flex:1;background:var(--s);
  border:1px solid var(--border);
  border-radius:12px;
  display:flex;flex-direction:column;overflow:hidden
}
.msgs{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px}
.msg.user{flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.av.ai{background:var(--aig)}
.av.user{background:var(--og)}
.bub{
  max-width:78%;padding:10px 14px;
  border-radius:10px;font-size:.8rem;line-height:1.6
}
.msg.ai .bub{background:var(--s2)}
.msg.user .bub{background:linear-gradient(135deg,var(--ai),#3b82f6);color:#fff}
.inp-row{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border)}
.inp{
  flex:1;resize:none;border:1px solid var(--border);
  border-radius:8px;padding:8px;font-family:'Cairo'
}
.sbtn{width:42px;border:none;border-radius:8px;background:var(--ai);color:#fff}
.res-ok{color:#16a34a;font-size:.7rem}
.res-err{color:#dc2626;font-size:.7rem}
</style>
</head>

<body>
<header>
  <div class="logo">🤖 المساعد الذكي</div>
</header>

<main>
  <div class="chat">
    <div class="msgs" id="msgs"></div>
    <div class="inp-row">
      <textarea class="inp" id="inp" placeholder="اكتب طلبك..."></textarea>
      <button class="sbtn" onclick="go()">➤</button>
    </div>
  </div>
</main>

<script>
/* ================= CONFIG ================= */
const SB_URL='https://cpbevbjzndfmtvlrwael.supabase.co';
const SB_KEY='YOUR_SUPABASE_ANON_KEY';
const db=supabase.createClient(SB_URL,SB_KEY);

let ctx={sites:[],engineers:[],visits:[],ve:[],scheds:[]};
let hist=[];
let busy=false;

/* ================= LOAD DATA ================= */
async function loadCtx(){
  const [s,e,v,ve,sc]=await Promise.all([
    db.from('sites').select('*').eq('is_active',true),
    db.from('engineers').select('*').eq('is_active',true),
    db.from('visits').select('*'),
    db.from('visit_engineers').select('*'),
    db.from('site_schedules').select('*').eq('is_active',true)
  ]);
  ctx.sites=s.data||[];
  ctx.engineers=e.data||[];
  ctx.visits=v.data||[];
  ctx.ve=ve.data||[];
  ctx.scheds=sc.data||[];
}
loadCtx();

/* ================= SYSTEM PROMPT ================= */
function buildSys(){
  const siteNames = ctx.sites.map(s=>s.name).join('، ') || 'لا يوجد';
  const engNames  = ctx.engineers.map(e=>e.name).join('، ') || 'لا يوجد';

  return `
انت مساعد ذكي لإدارة مواقع وزيارات.

اسماء المواقع:
${siteNames}

اسماء المهندسين:
${engNames}

قواعد:
- لا تخترع أسماء
- استخدم الموجود فقط
- لو عملية ارجع JSON فقط داخل ```json```
`;
}

/* ================= CHAT ================= */
function addMsg(text,role){
  const c=document.getElementById('msgs');
  const el=document.createElement('div');
  el.className='msg '+role;
  el.innerHTML=
    '<div class="av '+role+'">'+(role==='ai'?'🤖':'أنت')+'</div>'+
    '<div class="bub">'+text.replace(/\n/g,'<br>')+'</div>';
  c.appendChild(el);c.scrollTop=c.scrollHeight;
}

async function go(){
  if(busy)return;
  const inp=document.getElementById('inp');
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';
  addMsg(text,'user');
  busy=true;

  try{
    const res=await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+localStorage.getItem('or_key'),
        'HTTP-Referer':location.origin,
        'X-Title':'Ops Dashboard AI'
      },
      body:JSON.stringify({
        model:'meta-llama/llama-3.1-8b-instruct',
        temperature:0.2,
        max_tokens:600,
        messages:[
          {role:'system',content:buildSys()},
          ...hist,
          {role:'user',content:text}
        ]
      })
    });

    const data=await res.json();
    if(!res.ok) throw new Error(data.error?.message || 'Provider error');

    const reply=data.choices[0].message.content;
    hist.push({role:'user',content:text});
    hist.push({role:'assistant',content:reply});
    addMsg(reply,'ai');

  }catch(e){
    addMsg('❌ '+e.message,'ai');
  }
  busy=false;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 المساعد الذكي</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--surface);
            padding: 1rem;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background: var(--background);
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .nav-links a:hover {
            background: var(--primary);
            color: white;
        }

        /* Main Chat Container */
        .chat-container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Settings Panel */
        .settings-panel {
            background: var(--surface);
            padding: 1rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
        }

        .api-input-group {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            min-width: 250px;
        }

        .api-input-group input {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }

        .api-input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--background);
            color: var(--text);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            padding: 0.5rem;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .quick-action-btn {
            padding: 0.5rem 1rem;
            background: var(--background);
            border: 2px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .quick-action-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 1.5rem;
            overflow-y: auto;
            max-height: 60vh;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.ai .message-avatar {
            background: var(--primary);
            color: white;
        }

        .message.user .message-avatar {
            background: var(--secondary);
            color: white;
        }

        .message-content {
            background: var(--background);
            padding: 1rem;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .message.user .message-content {
            background: var(--primary);
            color: white;
        }

        .message-content p {
            margin-bottom: 0.5rem;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        /* Loading Indicator */
        .typing-indicator {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background: var(--background);
            border-radius: 12px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .chat-input-area {
            background: var(--surface);
            padding: 1rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            gap: 0.5rem;
        }

        .chat-input-area input {
            flex: 1;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .chat-input-area input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .send-btn {
            padding: 1rem 2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .send-btn:hover {
            background: var(--primary-dark);
        }

        .send-btn:disabled {
            background: var(--secondary);
            cursor: not-allowed;
        }

        /* Status Messages */
        .status-message {
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            margin: 1rem 0;
        }

        .status-message.error {
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .status-message.success {
            background: #f0fdf4;
            color: var(--success);
            border: 1px solid var(--success);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: stretch;
            }

            .nav-links {
                justify-content: center;
            }

            .settings-panel {
                flex-direction: column;
                align-items: stretch;
            }

            .api-input-group {
                flex-direction: column;
            }

            .chat-messages {
                max-height: 50vh;
                padding: 1rem;
            }

            .message {
                max-width: 95%;
            }

            .quick-actions {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .chat-input-area {
                flex-direction: column;
            }

            .send-btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.2rem;
            }

            .btn {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }

            .message-avatar {
                width: 35px;
                height: 35px;
                font-size: 1rem;
            }
        }

        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            :root {
                --background: #0f172a;
                --surface: #1e293b;
                --text: #f1f5f9;
                --text-light: #94a3b8;
                --border: #334155;
            }

            .message-content {
                background: #334155;
            }

            .message.user .message-content {
                background: var(--primary);
            }

            .quick-action-btn {
                background: #334155;
                color: var(--text);
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1>🤖 المساعد الذكي</h1>
            <nav class="nav-links">
                <a href="index.html">📊 الداش بورد</a>
                <a href="sites.html">🏢 المواقع</a>
                <a href="https://openrouter.ai/keys" target="_blank">🔑 احصل على API Key</a>
            </nav>
        </div>
    </header>

    <!-- Main Chat Container -->
    <main class="chat-container">
        <!-- Settings Panel -->
        <section class="settings-panel">
            <div class="api-input-group">
                <input 
                    type="password" 
                    id="apiKey" 
                    placeholder="🔑 OpenRouter API Key"
                    autocomplete="off"
                >
                <button class="btn btn-primary" onclick="saveApiKey()">
                    💾 حفظ
                </button>
            </div>
            <button class="btn btn-secondary" onclick="clearChat()">
                🗑️ مسح المحادثة
            </button>
        </section>

        <!-- Quick Actions -->
        <section class="quick-actions">
            <button class="quick-action-btn" onclick="sendQuickAction('أنشئ تقرير أسبوعي للمواقع')">
                📊 تقرير أسبوعي
            </button>
            <button class="quick-action-btn" onclick="sendQuickAction('ما هي الزيارات المتأخرة اليوم؟')">
                ⚠️ زيارات متأخرة
            </button>
            <button class="quick-action-btn" onclick="sendQuickAction('أعطني ملخص أداء المهندسين')">
                👷 أداء المهندسين
            </button>
            <button class="quick-action-btn" onclick="sendQuickAction('ما هي المواقع التي تحتاج متابعة؟')">
                📍 مواقع تحتاج متابعة
            </button>
            <button class="quick-action-btn" onclick="sendQuickAction('اقترح تحسينات للنظام')">
                💡 تحسينات مقترحة
            </button>
        </section>

        <!-- Chat Messages -->
        <section class="chat-messages" id="chatMessages">
            <div class="message ai">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <p>مرحباً! 👋</p>
                    <p>أنا مساعدك الذكي لإدارة النظام. ضع مفتاح API من <a href="https://openrouter.ai/keys" target="_blank" style="color: var(--primary);">openrouter.ai</a> في الأعلى وابدأ في السؤال!</p>
                    <p>يمكنني مساعدتك في:</p>
                    <ul style="margin-right: 1.5rem; margin-top: 0.5rem;">
                        <li>تحليل بيانات المواقع والزيارات</li>
                        <li>إنشاء تقارير تلقائية</li>
                        <li>تتبع أداء المهندسين</li>
                        <li>الإجابة على استفسارات النظام</li>
                    </ul>
                </div>
            </div>
        </section>

        <!-- Input Area -->
        <section class="chat-input-area">
            <input 
                type="text" 
                id="userInput" 
                placeholder="اكتب سؤالك هنا..."
                onkeypress="handleKeyPress(event)"
            >
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                إرسال 📤
            </button>
        </section>
    </main>

    <script>
        // === Configuration ===
        const API_ENDPOINT = '/api/chat'; // Vercel Serverless Function
        const FREE_MODELS = [
            'meta-llama/llama-3-8b-instruct:free',
            'mistralai/mistral-7b-instruct:free',
            'google/gemma-7b-it:free'
        ];

        // === State Management ===
        let conversationHistory = [];
        let apiKey = localStorage.getItem('openrouter_api_key') || '';

        // === Initialize ===
        document.addEventListener('DOMContentLoaded', () => {
            if (apiKey) {
                document.getElementById('apiKey').value = apiKey;
                showStatus('✅ تم تحميل مفتاح API المحفوظ', 'success');
            }
        });

        // === Functions ===
        function saveApiKey() {
            const key = document.getElementById('apiKey').value.trim();
            if (key) {
                localStorage.setItem('openrouter_api_key', key);
                apiKey = key;
                showStatus('✅ تم حفظ مفتاح API بنجاح', 'success');
            } else {
                showStatus('❌ يرجى إدخال مفتاح API صحيح', 'error');
            }
        }

        function clearChat() {
            conversationHistory = [];
            document.getElementById('chatMessages').innerHTML = `
                <div class="message ai">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <p>🗑️ تم مسح المحادثة. كيف يمكنني مساعدتك؟</p>
                    </div>
                </div>
            `;
        }

        function sendQuickAction(message) {
            document.getElementById('userInput').value = message;
            sendMessage();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function showStatus(message, type) {
            const statusDiv = document.createElement('div');
            statusDiv.className = `status-message ${type}`;
            statusDiv.textContent = message;
            document.querySelector('.chat-container').insertBefore(statusDiv, document.getElementById('chatMessages'));
            
            setTimeout(() => statusDiv.remove(), 3000);
        }

        function addMessage(content, isUser = false) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${isUser ? '👤' : '🤖'}</div>
                <div class="message-content">${content}</div>
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            if (isUser) {
                conversationHistory.push({ role: 'user', content: content });
            } else {
                conversationHistory.push({ role: 'assistant', content: content });
            }
        }

        function showTypingIndicator() {
            const chatMessages = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();

            if (!message) return;

            if (!apiKey) {
                showStatus('❌ يرجى إدخال مفتاح API أولاً', 'error');
                return;
            }

            // Disable input while processing
            input.disabled = true;
            sendBtn.disabled = true;
            sendBtn.textContent = 'جاري الإرسال...';

            // Add user message
            addMessage(message, true);
            input.value = '';

            // Show typing indicator
            showTypingIndicator();

            try {
                // Prepare system context for database awareness
                const systemContext = `
                    أنت مساعد ذكي لنظام إدارة المواقع والزيارات.
                    لديك القدرة على مساعدة المستخدمين في:
                    1. تحليل بيانات المواقع والزيارات
                    2. إنشاء تقارير
                    3. تتبع أداء المهندسين
                    4. الإجابة على استفسارات النظام
                    
                    ملاحظة: أنت لا تتصل بقاعدة البيانات مباشرة، ولكن يمكنك تقديم نصائح حول كيفية استخراج البيانات.
                    كن ودوداً ومحترفاً في ردودك.
                `;

                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        messages: [
                            { role: 'system', content: systemContext },
                            ...conversationHistory.slice(-10), // Last 10 messages for context
                            { role: 'user', content: message }
                        ],
                        model: FREE_MODELS[0] // Use free model
                    })
                });

                removeTypingIndicator();

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    const aiResponse = data.choices[0].message.content;
                    addMessage(aiResponse, false);
                } else {
                    throw new Error('Invalid response format');
                }

            } catch (error) {
                removeTypingIndicator();
                console.error('Error:', error);
                addMessage(`❌ حدث خطأ: ${error.message}. تأكد من صحة مفتاح API.`, false);
                showStatus('❌ فشل الاتصال بالخادم', 'error');
            } finally {
                // Re-enable input
                input.disabled = false;
                sendBtn.disabled = false;
                sendBtn.textContent = 'إرسال 📤';
                input.focus();
            }
        }
    </script>
</body>
</html>
